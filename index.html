<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>毕业季 - 数字媒体技术的浪漫</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="custom-cursor"></div>
  <div class="cursor-trail"></div>
  <div class="cursor-bug-text">NullPointerException</div>

  <!-- Audio Controls -->
  <button id="bgmToggle" class="bgm-toggle" title="背景音乐">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M9 18V5l12-2v13"/>
      <circle cx="6" cy="18" r="3"/>
      <circle cx="18" cy="16" r="3"/>
    </svg>
  </button>

  <!-- Scene 1: Entrance -->
  <section id="scene1" class="scene active">
    <canvas id="codeRain"></canvas>
    <div class="scene1-content">
      <div class="single-photo">
        <img src="images/portrait/单人.jpg" alt="单人照">
      </div>
      <h1 class="title">欢迎来到毕业季副本</h1>
      <div class="village-gate">
        <p class="question">是否准备离开新手村？</p>
        <button id="enterBtn" class="pixel-btn">
          <span class="btn-text">是</span>
        </button>
      </div>
    </div>
  </section>

  <!-- Scene 2: Meteor Shower -->
  <section id="scene2" class="scene">
    <canvas id="meteorShower"></canvas>
  </section>

  <!-- Scene 3: Certificates -->
  <section id="scene3" class="scene">
    <div class="certificate-bg">
      <img src="images/portrait/剑来.jpg" alt="剑来" class="bg-blur">
    </div>
    <div class="certificate-hall">
      <h2 class="hall-title">你的成就已解锁</h2>
      <div class="certificate-ring">
        <div class="certificate" data-name="实用新型专利证书">
          <img src="images/certificate/实用新型专利证书.jpg" alt="实用新型专利证书">
          <span class="cert-name">实用新型专利证书</span>
        </div>
        <div class="certificate" data-name="青年科普实验创新">
          <img src="images/certificate/青年科普实验创新.jpg" alt="青年科普实验创新">
          <span class="cert-name">青年科普实验创新</span>
        </div>
        <div class="certificate" data-name="计算机应用大赛">
          <img src="images/certificate/计算机应用大赛.jpg" alt="计算机应用大赛">
          <span class="cert-name">计算机应用大赛</span>
        </div>
        <div class="certificate" data-name="省赛C++三等奖">
          <img src="images/certificate/provincial-cpp.jpg" alt="省赛C++三等奖">
          <span class="cert-name">省赛C++三等奖</span>
        </div>
        <div class="certificate" data-name="第八届互联网+">
          <img src="images/certificate/第八届互联网plus.jpg" alt="第八届互联网+">
          <span class="cert-name">第八届互联网+</span>
        </div>
        <div class="certificate" data-name="第九届互联网+">
          <img src="images/certificate/第九届互联网plus.jpg" alt="第九届互联网+">
          <span class="cert-name">第九届互联网+</span>
        </div>
      </div>
    </div>
  </section>

  <!-- Scene 4: Gallery - Memory Galaxy -->
  <section id="scene4" class="scene">
    <canvas id="galleryBg"></canvas>
    <div class="galaxy-core"></div>
    <div class="mode-switcher" id="modeSwitcher">
      <button class="mode-btn active" data-mode="galaxy">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 2v4m0 12v4M2 12h4m12 0h4"/></svg>
        银河
      </button>
      <button class="mode-btn" data-mode="grid">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        画廊
      </button>
    </div>
    <div class="galaxy-field" id="galaxyField">
      <svg class="galaxy-lines" id="galaxyLines"></svg>
    </div>
    <div class="gallery-field" id="galleryField"></div>
    <p class="drag-hint" id="dragHint">✦ 拖拽探索 ✦</p>
    <div class="leave-hint">
      <button id="leaveBtn" class="pixel-btn leave-btn">准备好了</button>
    </div>
    <!-- Confirm Leave Modal -->
    <div id="leaveModal" class="leave-modal">
      <div class="leave-modal-content">
        <p class="leave-modal-text">确认离开这段回忆？</p>
        <button id="confirmLeaveBtn" class="pixel-btn confirm-btn">是</button>
      </div>
    </div>
  </section>

  <!-- Scene 5: Graduation Message -->
  <section id="scene5" class="scene">
    <canvas id="starsBg"></canvas>
    <div class="graduation-certificate">
      <img src="images/certificate/毕业证.jpg" alt="毕业证">
    </div>
    <div class="graduation-message"></div>
    <div class="restart-hint">
      <span>[ 点击任意位置重新开始 ]</span>
    </div>
  </section>

  <!-- Audio -->
  <audio id="bgm" preload="auto" loop>
    <source src="audio/bgm.mp3" type="audio/mpeg">
  </audio>
  <audio id="clickSound" preload="auto">
    <source src="audio/click.mp3" type="audio/mpeg">
  </audio>

  <script src="js/particles.js"></script>
  <script src="js/certificates.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
